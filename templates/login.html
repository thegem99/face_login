<!DOCTYPE html>
<html>
<head>
<title>Face ID</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0b1220, #05070d);
    overflow: hidden;
}

/* glow background */
body::before {
    content: "";
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, #3b82f6, transparent 60%);
    filter: blur(90px);
    opacity: 0.35;
    animation: float 6s ease-in-out infinite alternate;
}

@keyframes float {
    from { transform: translate(-60px, -60px); }
    to { transform: translate(60px, 60px); }
}

/* main card */
.card {
    width: 420px;
    padding: 40px;
    border-radius: 26px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.12);
    text-align: center;
    color: white;
    z-index: 10;
    box-shadow: 0 50px 140px rgba(0,0,0,0.7);
}

h2 {
    font-size: 22px;
    font-weight: 600;
}

p {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 25px;
}

/* camera */
.camera-box {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto;
    border-radius: 28px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
}

/* Face ID ring */
.ring {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    border: 2px solid rgba(59,130,246,0.7);
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.06); opacity: 1; }
    100% { transform: scale(1); opacity: 0.5; }
}

/* scanning beam */
.scan-line {
    position: absolute;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, #3b82f6, transparent);
    animation: scan 1.8s linear infinite;
}

@keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
}

/* success animation */
.success-ring {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    border: 2px solid #22c55e;
    animation: successPulse 0.6s ease-out 3;
    display: none;
}

@keyframes successPulse {
    0% { transform: scale(1); opacity: 0.2; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
}

/* status */
#msg {
    margin-top: 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<div class="card">

<h2>Face ID</h2>
<p>Look at your device to unlock</p>

<div class="camera-box">
    <video id="video" autoplay></video>
    <div class="ring"></div>
    <div class="scan-line"></div>
    <div class="success-ring" id="successRing"></div>
</div>

<div id="msg">Initializing Face ID...</div>

</div>

<script>
let scanning = true;

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    document.getElementById("video").srcObject = stream;
    msg("Face ID Ready");
    startScan();
});

function startScan() {
    setInterval(() => {
        if (!scanning) return;

        fetch("/login", { method: "POST" })
        .then(r => r.json())
        .then(d => {

            if (d.status === "success") {

                scanning = false;
                msg("Face ID Verified ✔");

                document.getElementById("successRing").style.display = "block";

                setTimeout(() => {
                    window.location = d.redirect;
                }, 1200);
            }

            else if (d.status === "no_face") {
                msg("Align your face in frame");
            }

            else {
                msg("Scanning...");
            }
        });

    }, 1500);
}

function msg(t) {
    document.getElementById("msg").innerText = t;
}
</script>

</body>
</html>
