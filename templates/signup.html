<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b0f19;
    overflow: hidden;
}

/* Animated gradient mesh background */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, #3b82f6, transparent 40%),
                radial-gradient(circle at 80% 30%, #9333ea, transparent 40%),
                radial-gradient(circle at 50% 80%, #22c55e, transparent 40%);
    filter: blur(80px);
    opacity: 0.6;
    animation: move 10s infinite alternate;
}

@keyframes move {
    0% { transform: translate(0,0); }
    100% { transform: translate(20px,-20px); }
}

/* Card */
.card {
    width: 420px;
    padding: 30px;
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    text-align: center;
    color: white;
    z-index: 10;
}

/* Title */
h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 15px;
}

/* Video */
video {
    width: 100%;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.15);
    margin-bottom: 15px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    margin-bottom: 10px;
}

input::placeholder {
    color: rgba(255,255,255,0.5);
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.25s ease;
}

.primary {
    background: #3b82f6;
    color: white;
    margin-bottom: 10px;
}

.success {
    background: #22c55e;
    color: white;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* Link */
a {
    display: block;
    margin-top: 12px;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
}

a:hover {
    color: white;
}

/* Message */
#msg {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
}
</style>
</head>

<body>

<div class="card">

<h2>Welcome 👋 Create Account</h2>

<video id="video" autoplay></video>

<input id="username" placeholder="Enter username">

<button class="primary" onclick="capture()">Capture Face</button>
<button class="success" onclick="signup()">Create Account</button>

<a href="/login-page">Already have an account? Sign in</a>

<div id="msg"></div>

</div>

<script>
let captured = false;

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    document.getElementById("video").srcObject = stream;
});

function capture(){
    fetch("/capture",{method:"POST"})
    .then(r=>r.json())
    .then(d=>{
        captured = (d.status === "ok");
        msg("Face captured ✔");
    });
}

function signup(){
    if(!captured) return msg("Please capture face first");

    let username = document.getElementById("username").value;

    fetch("/signup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username})
    })
    .then(r=>r.json())
    .then(d=>{
        msg(d.status);
        if(d.redirect){
            setTimeout(()=>window.location=d.redirect,1000);
        }
    });
}

function msg(t){
    document.getElementById("msg").innerText = t;
}
</script>

</body>
</html>
